clone:
  depth: full

pipelines:
  custom:
    mirror-via-webhook:
      - step:
          name: Mirror to GitHub (master, squash since last mirror)
          script:
            # Jen na masteru
            - CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
            - '[ "$CURRENT_BRANCH" = "master" ] || { echo "Not on master branch. Exiting."; exit 0; }'

            # Přidáme GitHub remote
            - git remote add github git@github.com:OndrejHajek-AutomationLabs/test.git

            # Stáhneme tagy z GitHubu (pokud existují)
            - git fetch github --tags || true

            # Pokud tag mirror-last neexistuje, vytvoříme ho z origin/master
            - git fetch origin master
            - |
              if [ -z "$(git ls-remote --tags github mirror-last)" ]; then
                echo "mirror-last tag not found on GitHub, creating initial tag from origin/master"
                git tag mirror-last origin/master
                git push github mirror-last
              fi

            # Stáhneme tag lokálně
            - git fetch github --tags
            - BASE=$(git rev-parse mirror-last)

            # Vytvoříme dočasnou větev pro mirror
            - git checkout master
            - git checkout -b ssgh-mirror-squash

            # Squash commitů od posledního mirror push
            - git reset --soft "$BASE"

            # Pokud není co commitnout, mirror se přeskočí
            - |
              if git diff --cached --quiet; then
                echo "No new commits since last mirror push. Skipping mirror."
                exit 0
              fi

            # Vytvoříme squashed commit
            - git commit -m "Squashed commits since last mirror push"

            # Push squashed větve jako master do GitHubu
            - git push github ssgh-mirror-squash:master --force

            # Aktualizace tagu mirror-last
            - git tag -f mirror-last ssgh-mirror-squash
            - git push github -f mirror-last

            # Úklid
            - git checkout master
            - git branch -D ssgh-mirror-squash
