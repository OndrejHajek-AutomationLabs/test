# Nastavení úplného stažení historie pro zrcadlení
clone:
  depth: full

pipelines:
  custom: # Tato sekce se nespouští automaticky při pushi
    mirror-via-webhook: # Název, který použijeme v API volání
      - step:
          name: Mirror to GitHub (master)
          script:
            - git remote add github git@github.com:OndrejHajek-AutomationLabs/test.git
            - git push --mirror github